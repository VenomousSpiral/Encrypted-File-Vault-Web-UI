{% extends "base.html" %}
{% block title %}{{ file.name }} — Encrypted Vault{% endblock %}

{% block head %}
<style>
    .cbz-page {
        display: block;
        max-width: 100%;
        max-height: calc(100vh - 120px);
        object-fit: contain;
        margin: 0 auto;
        user-select: none;
        -webkit-user-drag: none;
    }
    .cbz-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 76px);
        background: #1a1a1a;
    }
    .cbz-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-bottom: 1px solid #333;
        background: #0d0d0d;
        flex-wrap: wrap;
    }
    .cbz-toolbar .page-input {
        width: 70px;
        text-align: center;
        background: #222;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 0.9rem;
    }
    .cbz-toolbar .page-input:focus {
        outline: none;
        border-color: #0d6efd;
        background: #2a2a2a;
    }
    .cbz-toolbar .page-total {
        color: #8b949e;
        font-size: 0.85rem;
        white-space: nowrap;
    }
    .cbz-toolbar .btn { min-width: 36px; }
    .cbz-image-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    .cbz-image-area img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }
    .cbz-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #8b949e;
    }
    .cbz-filename {
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
        flex-grow: 1;
        min-width: 0;
        font-size: 0.9rem;
    }
    /* Click zones for page turning */
    .click-zone {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30%;
        cursor: pointer;
        z-index: 5;
    }
    .click-zone-left { left: 0; }
    .click-zone-right { right: 0; }
</style>
{% endblock %}

{% block content %}
<div class="cbz-container">
    <!-- Toolbar -->
    <div class="cbz-toolbar">
        <a href="{{ url_for('explorer') }}{% if file.parent_id is not none %}?parent_id={{ file.parent_id }}{% endif %}" class="btn btn-sm btn-outline-secondary" title="Back to files">
            <i class="fas fa-arrow-left"></i>
        </a>
        <span class="cbz-filename text-truncate" title="{{ file.name }}">{{ file.name }}</span>

        <button class="btn btn-sm btn-outline-secondary" id="prevBtn" title="Previous page">
            <i class="fas fa-chevron-left"></i>
        </button>

        <input type="number" class="page-input" id="pageInput" min="1" value="1"
               title="Go to page">

        <span class="page-total" id="pageTotal">/ ?</span>

        <button class="btn btn-sm btn-outline-secondary" id="nextBtn" title="Next page">
            <i class="fas fa-chevron-right"></i>
        </button>

        <a href="{{ url_for('download_file', file_id=file.id) }}" class="btn btn-sm btn-outline-primary" title="Download">
            <i class="fas fa-download"></i>
        </a>
    </div>

    <!-- Image display area -->
    <div class="cbz-image-area" id="imageArea">
        <div class="cbz-loading" id="loadingIndicator">
            <div class="spinner-border text-primary mb-2" role="status" style="width:2rem;height:2rem">
                <span class="visually-hidden">Loading…</span>
            </div>
            <p class="mb-0 small">Loading page…</p>
        </div>
        <img id="cbzImage" class="cbz-page" alt="CBZ page" style="display:none">
        <div class="click-zone click-zone-left" id="clickLeft" title="Previous page"></div>
        <div class="click-zone click-zone-right" id="clickRight" title="Next page"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const FILE_ID = {{ file.id }};
    let totalPages = 0;
    let currentPage = {{ cbz_prefs.get('page', 0) }}; // 0-indexed from DB

    const img = document.getElementById('cbzImage');
    const pageInput = document.getElementById('pageInput');
    const pageTotal = document.getElementById('pageTotal');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const loading = document.getElementById('loadingIndicator');
    const clickLeft = document.getElementById('clickLeft');
    const clickRight = document.getElementById('clickRight');

    function showPage(page) {
        if (page < 0 || page >= totalPages) return;
        currentPage = page;

        // Show loading indicator
        img.style.display = 'none';
        loading.style.display = 'block';

        // Load image from server
        const imgSrc = `/api/cbz/${FILE_ID}/image?page=${page}`;
        img.onload = function() {
            loading.style.display = 'none';
            img.style.display = 'block';
        };
        img.onerror = function() {
            loading.innerHTML = '<p class="text-danger small mb-0">Failed to load page</p>';
        };
        img.src = imgSrc;

        // Update UI
        pageInput.value = page + 1; // 1-indexed for display
        pageInput.max = totalPages;
        prevBtn.disabled = page === 0;
        nextBtn.disabled = page === totalPages - 1;

        // Save position (debounced)
        savePosition(page);
    }

    let saveTimeout = null;
    function savePosition(page) {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            fetch(`/api/cbz/${FILE_ID}/prefs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ page: page })
            }).catch(() => {});
        }, 300);
    }

    function goToPage(page) {
        if (page < 0) page = 0;
        if (page >= totalPages) page = totalPages - 1;
        showPage(page);
    }

    // Event listeners
    prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
    nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

    clickLeft.addEventListener('click', () => goToPage(currentPage - 1));
    clickRight.addEventListener('click', () => goToPage(currentPage + 1));

    pageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = parseInt(pageInput.value);
            if (!isNaN(val) && val >= 1 && val <= totalPages) {
                goToPage(val - 1); // Convert to 0-indexed
            } else {
                pageInput.value = currentPage + 1; // Reset to current
            }
        }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.target === pageInput) return; // Don't navigate when typing
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            goToPage(currentPage - 1);
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault();
            goToPage(currentPage + 1);
        } else if (e.key === 'Home') {
            e.preventDefault();
            goToPage(0);
        } else if (e.key === 'End') {
            e.preventDefault();
            goToPage(totalPages - 1);
        }
    });

    // Touch swipe support
    let touchStartX = 0;
    const imageArea = document.getElementById('imageArea');
    imageArea.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    imageArea.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(dx) > 50) {
            if (dx > 0) goToPage(currentPage - 1);
            else goToPage(currentPage + 1);
        }
    }, { passive: true });

    // Load page count first, then show initial page
    fetch(`/api/cbz/${FILE_ID}/pages`)
        .then(r => r.json())
        .then(data => {
            totalPages = data.pages || 0;
            pageTotal.textContent = '/' + totalPages;
            pageInput.max = totalPages;

            if (totalPages === 0) {
                loading.innerHTML = '<p class="text-secondary small mb-0">No pages found in CBZ file</p>';
                return;
            }

            // Clamp saved page
            if (currentPage < 0) currentPage = 0;
            if (currentPage >= totalPages) currentPage = totalPages - 1;

            showPage(currentPage);
        })
        .catch(() => {
            loading.innerHTML = '<p class="text-danger small mb-0">Failed to load CBZ file</p>';
        });
})();
</script>
{% endblock %}
