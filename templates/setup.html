{% extends "base.html" %}
{% block title %}Setup — Encrypted Vault{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:85vh">
    <div class="card bg-dark border-secondary shadow" style="width:440px">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="fas fa-shield-halved fa-3x text-success mb-3"></i>
                <h4 class="fw-semibold">Create Your Vault</h4>
                <p class="text-secondary small mb-0">
                    Choose a strong master password — it encrypts all your files.
                </p>
            </div>
            <form method="POST" autocomplete="off">
                <div class="mb-3">
                    <label class="form-label small text-secondary">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-secondary">Master Password</label>
                    <input type="password" name="password" class="form-control" required minlength="8">
                    <div class="form-text">Minimum 8 characters.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-secondary">Confirm Password</label>
                    <input type="password" name="confirm" class="form-control" required>
                </div>
                <button class="btn btn-success w-100 mt-1">
                    <i class="fas fa-key me-2"></i>Create Vault
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
